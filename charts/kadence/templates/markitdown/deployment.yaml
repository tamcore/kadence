{{- if .Values.markitdown.enabled }}
{{- $fullname := include "kadence.markitdown.fullname" . }}
{{- $authSecretName := include "kadence.markitdown.authSecretName" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "kadence.labels" . | nindent 4 }}
    app.kubernetes.io/component: markitdown
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kadence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: markitdown
  template:
    metadata:
      labels:
        {{- include "kadence.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: markitdown
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.markitdown.podSecurityContext | nindent 8 }}
      containers:
      - name: markitdown
        image: {{ .Values.markitdown.image }}
        # The MCP Python SDK hardcodes a 4MB per-message cap
        # (mcp.server.streamable_http.MAXIMUM_MESSAGE_SIZE), which rejects the
        # base64 data: URIs we send for real documents. markitdown-mcp exposes
        # no flag for it, so raise the module global at startup before serving.
        command: ["python", "-c"]
        args:
        - |
          import mcp.server.streamable_http as m
          m.MAXIMUM_MESSAGE_SIZE = {{ mul .Values.markitdown.maxMessageSizeMB 1048576 }}
          import sys
          from markitdown_mcp.__main__ import main
          # Bind to loopback only: the nginx sidecar shares this pod's network
          # namespace and proxies to 127.0.0.1, so markitdown never needs to be
          # exposed on the pod interface (avoids the unauthenticated-exposure warning).
          sys.argv = ["markitdown-mcp", "--http", "--host", "127.0.0.1", "--port", "{{ .Values.markitdown.port }}"]
          main()
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: {{ .Values.markitdown.port }}
          name: markitdown
        resources:
          {{- toYaml .Values.markitdown.resources | nindent 10 }}
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.31.3-alpine-slim
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8080
          name: http
        # markitdown binds 127.0.0.1 only, so the kubelet can't probe it
        # directly, and the image ships no `nc` for an exec-based probe —
        # probe the nginx sidecar's unauthenticated /healthz instead.
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.markitdown.nginx.resources | nindent 10 }}
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-auth
          mountPath: /etc/nginx/.htpasswd
          subPath: htpasswd
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        {{- if .Values.mcp.tls.enabled }}
        - name: nginx-tls
          mountPath: /etc/nginx/tls
          readOnly: true
        {{- end }}
      volumes:
      - name: nginx-conf
        configMap:
          name: {{ $fullname }}-nginx
      - name: nginx-auth
        secret:
          secretName: {{ $authSecretName }}
          items:
          - key: htpasswd
            path: htpasswd
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      {{- if .Values.mcp.tls.enabled }}
      - name: nginx-tls
        secret:
          secretName: {{ $fullname }}-tls
      {{- end }}
{{- end }}
