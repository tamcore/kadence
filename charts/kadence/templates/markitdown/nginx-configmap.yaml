{{- if .Values.markitdown.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kadence.markitdown.fullname" . }}-nginx
  labels:
    {{- include "kadence.labels" . | nindent 4 }}
    app.kubernetes.io/component: markitdown
data:
  default.conf: |
    server {
      {{- if .Values.mcp.tls.enabled }}
      listen 8080 ssl;
      ssl_certificate /etc/nginx/tls/tls.crt;
      ssl_certificate_key /etc/nginx/tls/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      {{- else }}
      listen 8080;
      {{- end }}

      # Uploads are base64-encoded into a data: URI before conversion (~1.34x
      # the raw bytes), so this must comfortably exceed KADENCE_UPLOAD_MAX_BYTES
      # (10Mi default) or conversions fail with 413 at the sidecar.
      client_max_body_size {{ .Values.markitdown.maxBodySize | default "16m" }};

      auth_basic "Kadence Markitdown";
      auth_basic_user_file /etc/nginx/.htpasswd;

      location / {
        proxy_pass http://127.0.0.1:{{ .Values.markitdown.port }};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Upstream is a fixed localhost markitdown-mcp container; use an
        # explicit Host (never the attacker-controllable request Host header).
        proxy_set_header Host "localhost";
        proxy_buffering off;
        proxy_read_timeout 3600s;
      }
    }
{{- end }}
