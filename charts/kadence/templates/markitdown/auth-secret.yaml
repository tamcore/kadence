{{- if .Values.markitdown.enabled }}
{{- $name := include "kadence.markitdown.authSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $user := "kadence" }}
{{- $pass := "" }}
{{- if and $existing $existing.data.password }}{{- $pass = index $existing.data "password" | b64dec }}{{- else }}{{- $pass = randAlphaNum 32 }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels: {{- include "kadence.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $user | quote }}
  password: {{ $pass | quote }}
  htpasswd: {{ htpasswd $user $pass | quote }}
{{- end }}
