{{- if and .Values.markitdown.enabled (not (and .Values.markitdown.basicAuth .Values.markitdown.basicAuth.existingSecret)) }}
{{- $name := include "kadence.markitdown.authSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $user := "kadence" }}
{{- $pass := "" }}
{{- if (.Values.markitdown.basicAuth).password }}
{{- /* Operator-supplied password: stable across renders (fixes basicAuth churn
       under `helm template | kubectl apply`, where the lookup below is inert).
       Parenthesized to nil-guard: `--set-json 'markitdown.basicAuth=null'` must
       not panic on `.password` when basicAuth itself is nil. */}}
{{- $pass = (.Values.markitdown.basicAuth).password }}
{{- else if and $existing $existing.data.password }}
{{- $pass = index $existing.data "password" | b64dec }}
{{- else }}
{{- $pass = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels: {{- include "kadence.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $user | quote }}
  password: {{ $pass | quote }}
  htpasswd: {{ htpasswd $user $pass | quote }}
{{- end }}
