{{- if and .Values.postgres.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kadence.fullname" . }}-postgres
  labels:
    {{- include "kadence.postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kadence.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          {{- include "kadence.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: app
    ports:
    - protocol: TCP
      port: 5432
{{- end }}
