{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kadence.fullname" . }}-postgres
  labels:
    {{- include "kadence.postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: postgres
    protocol: TCP
    name: postgres
  selector:
    {{- include "kadence.postgres.selectorLabels" . | nindent 4 }}
{{- end }}
