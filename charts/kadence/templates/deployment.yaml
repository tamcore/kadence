apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kadence.fullname" . }}
  labels:
    {{- include "kadence.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kadence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "kadence.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 310 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: wait-for-db
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ with .Values.image.digest }}@{{ . }}{{ end }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/kadence", "wait-for-db"]
        env:
        {{- include "kadence.dbEnv" . | nindent 8 }}
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
      containers:
      - name: kadence
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ with .Values.image.digest }}@{{ . }}{{ end }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: health
        env:
        {{- include "kadence.dbEnv" . | nindent 8 }}
        {{- range $server := .Values.mcp.servers }}
        {{- $prefix := include "kadence.mcp.envPrefix" (dict "root" $ "server" $server) }}
        {{- $svc := include "kadence.mcp.fullname" (dict "root" $ "server" $server) }}
        {{- $secret := $.Values.mcp.basicAuth.existingSecret | default (include "kadence.mcp.authSecretName" $) }}
        {{- $scheme := ternary "https" "http" $.Values.mcp.tls.enabled }}
        - name: {{ $prefix }}_URL
          value: {{ printf "%s://%s:8080%s" $scheme $svc ($server.path | default "/mcp") | quote }}
        - name: {{ $prefix }}_TRANSPORT
          value: {{ $server.transport | default "streamable-http" | quote }}
        - name: {{ $prefix }}_AUTH_USER
          valueFrom: { secretKeyRef: { name: {{ $secret }}, key: username } }
        - name: {{ $prefix }}_AUTH_PASS
          valueFrom: { secretKeyRef: { name: {{ $secret }}, key: password } }
        {{- with $server.tools }}
        - name: {{ $prefix }}_TOOLS
          value: {{ join "," . | quote }}
        {{- end }}
        {{- with $server.alias }}
        - name: {{ $prefix }}_ALIAS
          value: {{ . | quote }}
        {{- end }}
        {{- with $server.hint }}
        - name: {{ $prefix }}_HINT
          value: {{ . | quote }}
        {{- end }}
        {{- if and $server.fitAnalysis $server.fitAnalysis.enabled }}
        - name: KADENCE_FIT_DOWNLOAD_TOOL
          value: {{ $server.fitAnalysis.downloadTool | quote }}
        - name: KADENCE_FIT_BRIDGE_URL
          value: {{ printf "http://%s:8081" $svc | quote }}
        - name: KADENCE_FIT_BRIDGE_AUTH_USER
          valueFrom: { secretKeyRef: { name: {{ $secret }}, key: username } }
        - name: KADENCE_FIT_BRIDGE_AUTH_PASS
          valueFrom: { secretKeyRef: { name: {{ $secret }}, key: password } }
        {{- end }}
        {{- end }}
        {{- if .Values.markitdown.enabled }}
        {{- $mdSvc := include "kadence.markitdown.fullname" . }}
        {{- $mdSecret := include "kadence.markitdown.authSecretName" . }}
        {{- $mdScheme := ternary "https" "http" .Values.mcp.tls.enabled }}
        - name: KADENCE_MARKITDOWN_URL
          value: {{ printf "%s://%s:8080%s" $mdScheme $mdSvc .Values.markitdown.path | quote }}
        - name: KADENCE_MARKITDOWN_TRANSPORT
          value: "streamable-http"
        - name: KADENCE_MARKITDOWN_AUTH_USER
          valueFrom: { secretKeyRef: { name: {{ $mdSecret }}, key: username } }
        - name: KADENCE_MARKITDOWN_AUTH_PASS
          valueFrom: { secretKeyRef: { name: {{ $mdSecret }}, key: password } }
        {{- end }}
        {{- if .Values.mcp.tls.enabled }}
        - name: KADENCE_MCP_CA_FILE
          value: /etc/kadence/mcp-ca/ca.crt
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "kadence.fullname" . }}-config
        - secretRef:
            name: {{ include "kadence.fullname" . }}-secret
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.mcp.tls.enabled }}
        - name: mcp-ca
          mountPath: /etc/kadence/mcp-ca/ca.crt
          subPath: ca.crt
          readOnly: true
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if .Values.mcp.tls.enabled }}
      - name: mcp-ca
        secret:
          secretName: {{ include "kadence.fullname" . }}-mcp-ca
          items:
          - key: ca.crt
            path: ca.crt
      {{- end }}
