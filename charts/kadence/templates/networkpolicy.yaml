{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kadence.fullname" . }}
  labels:
    {{- include "kadence.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  podSelector:
    matchLabels:
      {{- include "kadence.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 8 }}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  {{- if .Values.postgres.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "kadence.postgres.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: 5432
  {{- end }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "kadence.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: mcp
    ports:
    - protocol: TCP
      port: 8080
  {{- if .Values.markitdown.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "kadence.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: markitdown
    ports:
    - protocol: TCP
      port: 8080
  {{- end }}
  {{- include "kadence.netpol.dnsEgress" . | nindent 2 }}
  {{- include "kadence.netpol.httpsEgress" . | nindent 2 }}
  {{- with .Values.networkPolicy.extraAppEgress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
