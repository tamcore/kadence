{{- if and .Values.mcp.servers (not (and .Values.mcp.basicAuth .Values.mcp.basicAuth.existingSecret)) }}
{{- $name := include "kadence.mcp.authSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $user := .Values.mcp.authUsername | default "kadence" }}
{{- $pass := "" }}
{{- if .Values.mcp.basicAuth.password }}
{{- /* Operator-supplied password: stable across renders (fixes basicAuth churn
       under `helm template | kubectl apply`, where the lookup below is inert). */}}
{{- $pass = .Values.mcp.basicAuth.password }}
{{- else if and $existing $existing.data.password }}
{{- $pass = index $existing.data "password" | b64dec }}
{{- else }}
{{- $pass = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels: {{- include "kadence.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ $user | quote }}
  password: {{ $pass | quote }}
  htpasswd: {{ htpasswd $user $pass | quote }}
{{- end }}
