{{- if .Values.networkPolicy.enabled }}
{{- range .Values.mcp.servers }}
{{- $server := . }}
{{- $root := $ }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kadence.mcp.fullname" (dict "root" $root "server" $server) }}
  labels:
    {{- include "kadence.labels" $root | nindent 4 }}
    app.kubernetes.io/component: mcp
    kadence.io/mcp-server: {{ $server.name }}
spec:
  podSelector:
    matchLabels:
      {{- include "kadence.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: mcp
      kadence.io/mcp-server: {{ $server.name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          {{- include "kadence.selectorLabels" $root | nindent 10 }}
          app.kubernetes.io/component: app
    ports:
    - protocol: TCP
      port: 8080
  egress:
  {{- if $server.egress }}
  {{- toYaml $server.egress | nindent 2 }}
  {{- else }}
  {{- include "kadence.netpol.dnsEgress" $root | nindent 2 }}
  {{- if eq $server.name "cloakbrowser" }}
  {{- include "kadence.netpol.publicWebEgress" $root | nindent 2 }}
  {{- else }}
  {{- include "kadence.netpol.httpsEgress" $root | nindent 2 }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
