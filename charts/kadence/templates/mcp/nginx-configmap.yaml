{{- range .Values.mcp.servers }}
{{- $server := . }}
{{- $root := $ }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kadence.mcp.fullname" (dict "root" $root "server" $server) }}-nginx
  labels:
    {{- include "kadence.labels" $root | nindent 4 }}
    app.kubernetes.io/component: mcp
    kadence.io/mcp-server: {{ $server.name }}
data:
  default.conf: |
    server {
      {{- if $root.Values.mcp.tls.enabled }}
      listen 8080 ssl;
      ssl_certificate /etc/nginx/tls/tls.crt;
      ssl_certificate_key /etc/nginx/tls/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      {{- else }}
      listen 8080;
      {{- end }}

      auth_basic "Kadence MCP";
      auth_basic_user_file /etc/nginx/.htpasswd;

      location / {
        proxy_pass http://127.0.0.1:{{ $server.port }};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Upstream is a fixed localhost MCP container; use an explicit Host
        # (never the attacker-controllable request Host header).
        proxy_set_header Host "localhost";
        proxy_buffering off;
        proxy_read_timeout 3600s;
      }
    }
{{- end }}
