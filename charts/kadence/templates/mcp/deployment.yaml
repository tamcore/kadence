{{- range .Values.mcp.servers }}
{{- $server := . }}
{{- $root := $ }}
{{- $fullname := include "kadence.mcp.fullname" (dict "root" $root "server" $server) }}
{{- $authSecretName := $root.Values.mcp.basicAuth.existingSecret | default (include "kadence.mcp.authSecretName" $root) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "kadence.labels" $root | nindent 4 }}
    app.kubernetes.io/component: mcp
    kadence.io/mcp-server: {{ $server.name }}
spec:
  replicas: 1
  {{- if and $server.persistence $server.persistence.enabled }}
  # A per-server PVC is ReadWriteOnce; the default RollingUpdate keeps the old
  # pod alive until the new one is Ready, but the new pod can't mount the RWO
  # volume while the old pod (possibly on another node) still holds it —
  # deadlocking the rollout. Recreate tears the old pod down first.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "kadence.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: mcp
      kadence.io/mcp-server: {{ $server.name }}
  template:
    metadata:
      labels:
        {{- include "kadence.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: mcp
        kadence.io/mcp-server: {{ $server.name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml ($server.securityContext | default $root.Values.mcp.podSecurityContext) | nindent 8 }}
      containers:
      - name: mcp
        image: {{ $server.image }}
        imagePullPolicy: {{ $server.pullPolicy | default "IfNotPresent" }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: {{ $server.port }}
          name: mcp
        resources:
          {{- toYaml ($server.resources | default $root.Values.mcp.resources) | nindent 10 }}
        {{- with $server.env }}
        env:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $server.existingSecret }}
        envFrom:
        - secretRef:
            name: {{ $server.existingSecret }}
        {{- end }}
        {{- if or (and $server.persistence $server.persistence.enabled) $server.shm (and $server.fitAnalysis $server.fitAnalysis.enabled) }}
        volumeMounts:
        {{- if and $server.persistence $server.persistence.enabled }}
        - name: data
          mountPath: {{ $server.persistence.mountPath }}
        {{- end }}
        {{- if $server.shm }}
        # Chromium-based MCP servers crash on the default 64Mi /dev/shm.
        - name: dshm
          mountPath: /dev/shm
        {{- end }}
        {{- if and $server.fitAnalysis $server.fitAnalysis.enabled }}
        - name: fit-files
          mountPath: {{ $server.fitAnalysis.downloadDir }}
        {{- end }}
        {{- end }}
      {{- if and $server.fitAnalysis $server.fitAnalysis.enabled }}
      - name: file-bridge
        image: {{ $root.Values.image.repository }}:{{ $root.Values.image.tag | default $root.Chart.AppVersion }}
        command: ["/kadence", "file-bridge"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8081
          name: file-bridge
        readinessProbe:
          httpGet:
            path: /healthz
            port: file-bridge
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: file-bridge
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml $root.Values.mcp.nginx.resources | nindent 10 }}
        env:
        - name: KADENCE_FILE_BRIDGE_ROOT
          value: {{ $server.fitAnalysis.downloadDir | quote }}
        - name: KADENCE_FILE_BRIDGE_AUTH_USER
          valueFrom: { secretKeyRef: { name: {{ $authSecretName }}, key: username } }
        - name: KADENCE_FILE_BRIDGE_AUTH_PASS
          valueFrom: { secretKeyRef: { name: {{ $authSecretName }}, key: password } }
        volumeMounts:
        - name: fit-files
          mountPath: {{ $server.fitAnalysis.downloadDir }}
      {{- end }}
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.31.3-alpine-slim
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8080
          name: http
        # The mcp container binds 127.0.0.1 only (never the pod IP), so the
        # kubelet can't probe it directly, and none of the current MCP images
        # ship `nc` for an exec-based probe either — probe the nginx sidecar's
        # unauthenticated /healthz instead, which proves the shared network
        # namespace (and therefore the upstream) is reachable.
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
            # nginx serves TLS on 8080 when mcp.tls is enabled; the kubelet
            # skips certificate verification for HTTPS probes.
            scheme: {{ ternary "HTTPS" "HTTP" $root.Values.mcp.tls.enabled }}
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
            # nginx serves TLS on 8080 when mcp.tls is enabled; the kubelet
            # skips certificate verification for HTTPS probes.
            scheme: {{ ternary "HTTPS" "HTTP" $root.Values.mcp.tls.enabled }}
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml $root.Values.mcp.nginx.resources | nindent 10 }}
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-auth
          mountPath: /etc/nginx/.htpasswd
          subPath: htpasswd
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        {{- if $root.Values.mcp.tls.enabled }}
        - name: nginx-tls
          mountPath: /etc/nginx/tls
          readOnly: true
        {{- end }}
      volumes:
      - name: nginx-conf
        configMap:
          name: {{ $fullname }}-nginx
      - name: nginx-auth
        secret:
          secretName: {{ $authSecretName }}
          items:
          - key: htpasswd
            path: htpasswd
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      {{- if $root.Values.mcp.tls.enabled }}
      - name: nginx-tls
        secret:
          secretName: {{ $fullname }}-tls
      {{- end }}
      {{- if and $server.persistence $server.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ $fullname }}
      {{- end }}
      {{- if $server.shm }}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: {{ $server.shm }}
      {{- end }}
      {{- if and $server.fitAnalysis $server.fitAnalysis.enabled }}
      - name: fit-files
        emptyDir: {}
      {{- end }}
---
{{- if and $server.persistence $server.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "kadence.labels" $root | nindent 4 }}
    app.kubernetes.io/component: mcp
    kadence.io/mcp-server: {{ $server.name }}
spec:
  accessModes:
  - ReadWriteOnce
  {{- with $server.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $server.persistence.size }}
{{- end }}
---
{{- end }}
