# NOTE: the Deployment's livenessProbe targets a dedicated :8081 health
# listener introduced in this wave. Upgrading only the chart (without also
# upgrading to an image version that serves :8081) will crash-loop on
# liveness — the probe has nothing to connect to. Always upgrade chart and
# image together from this wave onward.
image:
  repository: ghcr.io/tamcore/kadence
  tag: "" # defaults to .Chart.AppVersion
  digest: "" # optional: pin by digest, e.g. sha256:...
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

replicaCount: 2

# terminationGracePeriodSeconds must cover the app's shutdown drain window
# (in-flight SSE chat streams can run up to KADENCE_LLM_TIMEOUT, currently
# bounded by shutdownTimeout=310s in cmd/server/serve/serve.go) PLUS the
# subsequent background-goroutine drain (goroutineDrainTimeout=15s) PLUS the
# final health-listener shutdown that runs after both of those complete —
# 310 + 15 = 325s worst case before the health listener even starts closing.
# 310 alone left zero margin: the kubelet would SIGKILL mid-drain the moment
# the main server used its full budget. 335s gives ~10s of headroom for the
# health listener's own (normally near-instant) shutdown. Only applied to
# the app Deployment (not sidecars).
terminationGracePeriodSeconds: 335

podDisruptionBudget:
  enabled: true
  minAvailable: 1

service:
  type: ClusterIP
  port: 8080

# NetworkPolicies (wave 2, issue 14). Covers: postgres ingress-from-app,
# app ingress-from-ingress-controller + egress-to-{postgres,mcp,markitdown,
# DNS,external-443}, and (non-cloakbrowser) mcp/markitdown egress. See the
# per-server `mcp.servers[].egress` key above for tightening a single server.
networkPolicy:
  enabled: true
  # Opt-in namespace-wide default-deny-all (ingress+egress). Only flip this on
  # once you've confirmed the explicit allow policies above cover every flow
  # your deployment actually uses. Note this is unrelated to the
  # externalDatabase gap below — that gap exists regardless of defaultDeny,
  # because with the bundled Postgres disabled there is simply no egress
  # rule at all for the app -> external DB host; see extraAppEgress.
  defaultDeny: false
  # Namespace the ingress controller's pods live in; the app NetworkPolicy
  # allows ingress from any pod in a namespace matching this selector.
  # Default matches the ingress-nginx project's conventional namespace name.
  ingressNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: ingress-nginx
  # CoreDNS pod label values to match in the DNS egress rule's
  # matchExpressions (see kadence.netpol.dnsEgress). "kube-dns" covers
  # kubeadm/vanilla clusters; "coredns" covers clusters that label the
  # CoreDNS pods with the deployment name instead. Add to this list if your
  # cluster uses a different convention.
  dnsPodSelectorValues:
  - kube-dns
  - coredns
  # Raw NetworkPolicy egress rule list appended verbatim to the app
  # Deployment's egress rules (in addition to the postgres/mcp/markitdown/
  # DNS/external-443 rules above). Use this to allow egress to resources
  # this chart doesn't know about — most importantly, an externalDatabase
  # host: when postgres.enabled=false, NOTHING in this chart's default
  # rules covers the app -> DB connection (the bundled-postgres egress rule
  # above is gated on postgres.enabled=true), so with networkPolicy.enabled
  # (or defaultDeny) on, the app cannot reach an external DB unless you add
  # a rule here for its host/port. Example:
  #   extraAppEgress:
  #   - to:
  #     - ipBlock:
  #         cidr: 10.20.30.40/32
  #     ports:
  #     - protocol: TCP
  #       port: 5432
  extraAppEgress: []
  # NOTE: kubelet's liveness/readiness probes hit the pod directly from the
  # node (not via a NetworkPolicy-selectable pod/namespace), so probe
  # traffic to ports 8080/8081 is never subject to these NetworkPolicies —
  # no ingress rule is needed (or possible) for probes to keep working.

ingress:
  enabled: false
  className: nginx
  host: "" # set in values-dev.yaml
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/tls-acme: "true"
    # SSE tuning: agentic chat turns can run long, and default proxy idle/read
    # timeouts (and response buffering) can drop or stall the stream mid-turn.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  tls: true
  # Max request body size for the nginx ingress; must exceed
  # KADENCE_UPLOAD_MAX_BYTES (10Mi default) so document uploads are not
  # rejected with 413 before reaching the app. Empty disables the annotation.
  maxBodySize: "12m"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

# Non-secret app config (rendered into a ConfigMap -> envFrom).
config:
  KADENCE_ENV: production
  KADENCE_LLM_BASE_URL: ""
  KADENCE_LLM_MODEL: ""
  KADENCE_EMBED_BASE_URL: ""
  # Changing KADENCE_EMBED_MODEL re-embeds existing RAG chunks in place (no data
  # loss): on startup the app tags any untagged chunks as the current model, then
  # a background worker re-embeds anything still on a different model. Vector
  # search filters to the current model, so recall degrades gracefully and
  # self-heals — never a hard error.
  # ROLLOUT RULE: do NOT change this model in the SAME deploy that first
  # introduces the re-index feature. Roll the feature out first; change the model
  # in a LATER deploy. Otherwise pre-existing vectors get tagged as the new model
  # without being re-embedded, and mixed-dimension vectors reach the distance
  # operator (query errors) instead of being re-embedded.
  KADENCE_EMBED_MODEL: ""
  KADENCE_ADMIN_USERNAME: ""
  KADENCE_ADMIN_EMAIL: ""
  # KADENCE_TRUSTED_ORIGINS: "" # e.g. "https://kadence.example.com"
  #   Required (together with KADENCE_WEBAUTHN_RP_ID below and a valid
  #   secrets.KADENCE_ENCRYPTION_KEY) to enable passkeys. Without it, passkey
  #   login/registration silently stays unavailable — no error, the feature
  #   just doesn't appear.
  # KADENCE_WEBAUTHN_RP_ID: "" # e.g. "kadence.example.com" (the site's effective domain)
  #   Required (together with KADENCE_TRUSTED_ORIGINS above and
  #   secrets.KADENCE_ENCRYPTION_KEY) to enable passkeys. Without it, passkey
  #   login/registration silently stays unavailable.

# Secret app config (rendered into a Secret -> envFrom). Empty here; set in values-dev.yaml.
secrets:
  KADENCE_CSRF_SECRET: ""
  KADENCE_LLM_API_KEY: ""
  KADENCE_EMBED_API_KEY: ""
  KADENCE_ADMIN_PASSWORD: ""
  # KADENCE_ENCRYPTION_KEY: "" # base64-encoded 32-byte key; generate with:
  #   openssl rand -base64 32
  #   Required for passkeys (with config.KADENCE_WEBAUTHN_RP_ID +
  #   config.KADENCE_TRUSTED_ORIGINS above) and for user-defined MCP servers
  #   (with config.KADENCE_USER_MCP_ALLOWED_HOSTS). Without it, both features
  #   silently stay unavailable — no error, no crash, just missing functionality.

# Bundled Postgres (pgvector). When enabled, the chart runs its own
# StatefulSet + Service and wires KADENCE_DATABASE_URL to it.
# migration 00003 requires `CREATE EXTENSION vector`, hence the pgvector image.
postgres:
  enabled: false
  image: pgvector/pgvector:pg17
  storage: 10Gi
  storageClass: "" # set in values-dev.yaml to a pgvector-capable class
  database: kadence
  username: kadence
  password: "" # required when enabled; set in values-dev.yaml
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# External database. Used only when postgres.enabled=false.
# IMPORTANT: with networkPolicy.enabled (or defaultDeny) on, the chart's
# default egress rules do NOT cover this host — the bundled-postgres egress
# rule in the app NetworkPolicy is gated on postgres.enabled=true and there
# is no equivalent rule for an external DB. Add an allow rule for this
# host/port to networkPolicy.extraAppEgress or the app will be unable to
# reach it.
externalDatabase:
  url: "" # postgres://user:pass@host:5432/db?sslmode=require
  existingSecret: "" # optional: name of a secret holding the DB URL key
  existingSecretKey: "KADENCE_DATABASE_URL" # key within existingSecret holding the DB URL

# MCP servers. Each entry -> a Deployment (MCP image) + nginx basicAuth sidecar
# + Service + NetworkPolicy, and MCP_<NAME>_<SCOPE>_* env injected into the main app.
# See values-dev.yaml.example.
#
# Per-server object keys:
#   name        (required) DNS-safe, NO underscores (breaks the MCP_<NAME>_* Go parser)
#   scope       "global" (all users) or {user: <username>}
#   image, pullPolicy, transport (streamable-http|sse), port, path
#   tools       app-side glob allowlist, e.g. ["browser_*"]
#   alias       (optional) short name replacing `name` as this server's tool-name
#               prefix (e.g. alias "browser" -> tools appear as "browser__navigate"
#               instead of "cloakbrowser__navigate"). Must match the same
#               [a-z0-9][a-z0-9-]{0,31} format as `name`; on a collision with
#               another visible server the app falls back to `name` and logs a
#               warning instead of failing startup.
#   hint        (optional) free-text "when to use this" line surfaced to the model
#               in the chat system prompt, e.g. "a full live web browser — use for
#               current info: weather, news, prices, or any URL the user mentions"
#   env         [{name, value}] passed to the MCP container
#   existingSecret / persistence  (optional)
#   resources   (optional) standard container resources; unset -> mcp.resources default
#   securityContext (optional) pod-level securityContext override for images that
#               cannot run as the default non-root uid (verify with
#               `docker run --user 65532:65532` before relying on this — garmin-mcp,
#               cloakbrowser-mcp, and markitdown all run fine non-root as-is and
#               don't need it)
#   shm         (optional) size string, e.g. "512Mi"; mounts a Memory-backed
#               emptyDir at /dev/shm — required for Chromium-based servers
#               (Playwright/cloakbrowser) which crash on the default 64Mi shm
#   fitAnalysis (optional) enables transient FIT-file analysis for this server:
#               {enabled, downloadDir, downloadTool}. downloadTool is the fully
#               qualified app-side tool name (`<server>__<tool>`). The MCP
#               container and an authenticated Kadence bridge share downloadDir
#               via emptyDir; the app deletes each file after a successful fetch.
#   egress      (optional, requires networkPolicy.enabled) raw NetworkPolicy
#               `egress` rule list that REPLACES this server's default
#               egress. The default (every MCP server, not just
#               cloakbrowser) is cluster DNS + TCP 80/443 to 0.0.0.0/0
#               EXCEPT RFC1918 private ranges and link-local (see
#               kadence.netpol.httpsEgress) — so out of the box no server
#               can reach cluster-internal services or node metadata over
#               80/443. A server that genuinely needs a private/in-cluster
#               endpoint (e.g. a self-hosted API on a RFC1918 address) must
#               set its own `egress` override here, since the shared
#               except-list rule blocks that by design.
mcp:
  servers: []
  authUsername: kadence # basicAuth username the app uses for every MCP server
  basicAuth:
    existingSecret: "" # optional: a Secret with username/password/htpasswd keys (else auto-generated)
    # Optional: bring your own basicAuth password (stable across renders).
    # RECOMMENDED when deploying via `helm template | kubectl apply` — there the
    # auto-generation's lookup-based stickiness does not work and the password
    # would be regenerated every deploy, breaking MCP sidecar auth until pods
    # restart. Set a fixed value here to avoid that. Empty = auto-generate.
    password: ""
  tls:
    enabled: false # requires cert-manager on cluster; mints per-server certs and serves app<->MCP over HTTPS
  # Pod-level securityContext applied to every MCP server pod. Verified
  # (2026-07-22, remote docker `--user 65532:65532`) that garmin-mcp,
  # cloakbrowser-mcp, and markitdown all start fine as this non-root uid with
  # a writable $HOME; override per-server via the server's own
  # `securityContext` key for an image that genuinely can't run non-root.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  # Default mcp container resources; a per-server `resources` key overrides this.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  nginx:
    # nginx sidecar resources shared by every MCP server's proxy container.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

# Optional markitdown-mcp ingestion sidecar. When enabled, renders a fixed
# Deployment (markitdown-mcp) + nginx basicAuth sidecar + Service +
# NetworkPolicy, and wires KADENCE_MARKITDOWN_* env into the main app so it
# becomes the preferred document-ingestion extractor (PDF extractor is the
# fallback). See values-dev.yaml.example.
markitdown:
  enabled: false
  image: mcp/markitdown:latest # public image; pin a digest/tag in prod
  port: 3001
  # Trailing slash is required: markitdown-mcp (starlette) 307-redirects
  # /mcp -> /mcp/, and the sidecar's fixed Host header turns that redirect
  # into an unreachable localhost URL. Hitting /mcp/ directly avoids it.
  path: /mcp/
  # Sidecar nginx body limit; must exceed the base64-inflated upload size
  # (~1.34x KADENCE_UPLOAD_MAX_BYTES) or conversions fail with 413.
  maxBodySize: "16m"
  # Overrides the MCP Python SDK's 4MB per-message cap (not otherwise
  # configurable) so large base64 documents convert. Keep >= maxBodySize.
  maxMessageSizeMB: 64
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  # Pod-level securityContext, same treatment and verification as mcp.podSecurityContext.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  nginx:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  basicAuth:
    existingSecret: "" # optional: a Secret with username/password/htpasswd keys (else auto-generated)
    # Optional: bring your own basicAuth password (stable across renders).
    # RECOMMENDED when deploying via `helm template | kubectl apply` — there the
    # auto-generation's lookup-based stickiness does not work and the password
    # would be regenerated every deploy, breaking markitdown sidecar auth until
    # pods restart. Set a fixed value here to avoid that. Empty = auto-generate.
    password: ""
