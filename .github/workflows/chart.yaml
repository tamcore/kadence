name: Chart

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      - run: helm lint ./charts/kadence
      - run: helm template kadence ./charts/kadence
      - run: helm template kadence ./charts/kadence -f ./charts/kadence/values-dev.yaml.example
      - run: >
          helm template kadence ./charts/kadence
          --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds","persistence":{"enabled":true,"size":"1Gi","mountPath":"/root/.garminconnect"}}]'
      - name: template with networkPolicy.defaultDeny=true (wave 2, issue 14)
        run: >
          helm template kadence ./charts/kadence
          --set postgres.enabled=true --set postgres.password=x
          --set markitdown.enabled=true
          --set networkPolicy.defaultDeny=true
          --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds"},{"name":"cloakbrowser","scope":"global","image":"example/cloakbrowser-mcp:latest","transport":"streamable-http","port":9000,"path":"/mcp","shm":"512Mi"}]'
      - name: template with networkPolicy.enabled=false
        run: >
          helm template kadence ./charts/kadence
          --set networkPolicy.enabled=false
      - name: assert app Deployment + PDB selectors are component-scoped
        run: |
          helm template kadence ./charts/kadence > /tmp/rendered.yaml
          for kind in Deployment PodDisruptionBudget; do
            component=$(yq eval "select(.kind == \"$kind\" and .metadata.name == \"kadence\") | .spec.selector.matchLabels.\"app.kubernetes.io/component\"" /tmp/rendered.yaml)
            if [ "$component" != "app" ]; then
              echo "expected $kind selector app.kubernetes.io/component=app, got '$component'"
              exit 1
            fi
          done
      - name: assert Scheduled configuration wiring
        run: |
          helm template kadence ./charts/kadence > /tmp/rendered-scheduled-default.yaml
          default_enabled=$(yq eval-all '[select(.kind == "ConfigMap" and .metadata.name == "kadence-config") | .data | to_entries[] | select(.key == "KADENCE_SCHEDULED_ENABLED")] | length' /tmp/rendered-scheduled-default.yaml)
          if [ "$default_enabled" != "0" ]; then
            echo "expected default render not to enable Scheduled, got $default_enabled KADENCE_SCHEDULED_ENABLED entries"
            exit 1
          fi
          default_termination_grace=$(yq eval-all 'select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.template.spec.terminationGracePeriodSeconds' /tmp/rendered-scheduled-default.yaml)
          if [ "$default_termination_grace" != "635" ]; then
            echo "expected default Scheduled termination grace period to be 635 seconds, got '$default_termination_grace'"
            exit 1
          fi

          helm template kadence ./charts/kadence \
            --set config.KADENCE_SCHEDULED_ENABLED=true \
            --set-string config.KADENCE_SCHEDULED_WORKER_MODEL=scheduled-worker-model \
            --set-string config.KADENCE_SCHEDULED_WORKER_BASE_URL=https://worker.example.com/v1 \
            --set config.KADENCE_SCHEDULED_WORKER_MAX_TOKENS=1024 \
            --set-string config.KADENCE_SCHEDULED_WORKER_TIMEOUT=90s \
            --set config.KADENCE_SCHEDULED_WORKER_MAX_ITERATIONS=8 \
            --set config.KADENCE_SCHEDULED_WORKER_CONCURRENCY=2 \
            --set config.KADENCE_SCHEDULED_MAX_ACTIVE_PER_USER=4 \
            --set-string secrets.KADENCE_SCHEDULED_WORKER_API_KEY=scheduled-worker-key \
            > /tmp/rendered-scheduled-enabled.yaml
          for expected in \
            KADENCE_SCHEDULED_ENABLED=true \
            KADENCE_SCHEDULED_WORKER_MODEL=scheduled-worker-model \
            KADENCE_SCHEDULED_WORKER_BASE_URL=https://worker.example.com/v1 \
            KADENCE_SCHEDULED_WORKER_MAX_TOKENS=1024 \
            KADENCE_SCHEDULED_WORKER_TIMEOUT=90s \
            KADENCE_SCHEDULED_WORKER_MAX_ITERATIONS=8 \
            KADENCE_SCHEDULED_WORKER_CONCURRENCY=2 \
            KADENCE_SCHEDULED_MAX_ACTIVE_PER_USER=4; do
            key=${expected%%=*}
            want=${expected#*=}
            actual=$(yq eval-all "select(.kind == \"ConfigMap\" and .metadata.name == \"kadence-config\") | .data.$key" /tmp/rendered-scheduled-enabled.yaml)
            if [ "$actual" != "$want" ]; then
              echo "expected enabled Scheduled ConfigMap $key=$want, got '$actual'"
              exit 1
            fi
          done
          enabled_key=$(yq eval-all 'select(.kind == "Secret" and .metadata.name == "kadence-secret") | .stringData.KADENCE_SCHEDULED_WORKER_API_KEY' /tmp/rendered-scheduled-enabled.yaml)
          enabled_key_in_config=$(yq eval-all '[select(.kind == "ConfigMap" and .metadata.name == "kadence-config") | .data | to_entries[] | select(.key == "KADENCE_SCHEDULED_WORKER_API_KEY")] | length' /tmp/rendered-scheduled-enabled.yaml)
          replicas=$(yq eval-all 'select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.replicas' /tmp/rendered-scheduled-enabled.yaml)
          if [ "$enabled_key" != "scheduled-worker-key" ] || [ "$enabled_key_in_config" != "0" ] || [ "$replicas" != "2" ]; then
            echo "expected worker key only in Secret and app replicas=2; got secret-key='$enabled_key' config-key-count=$enabled_key_in_config replicas=$replicas"
            exit 1
          fi

          helm template kadence ./charts/kadence \
            --set config.KADENCE_SCHEDULED_ENABLED=true \
            --set-string config.KADENCE_LLM_MODEL=primary-model \
            --set-string config.KADENCE_LLM_BASE_URL=https://primary.example.com/v1 \
            --set-string secrets.KADENCE_LLM_API_KEY=primary-api-key \
            > /tmp/rendered-scheduled-fallback.yaml
          fallback_model=$(yq eval-all 'select(.kind == "ConfigMap" and .metadata.name == "kadence-config") | .data.KADENCE_LLM_MODEL' /tmp/rendered-scheduled-fallback.yaml)
          fallback_base_url=$(yq eval-all 'select(.kind == "ConfigMap" and .metadata.name == "kadence-config") | .data.KADENCE_LLM_BASE_URL' /tmp/rendered-scheduled-fallback.yaml)
          fallback_api_key=$(yq eval-all 'select(.kind == "Secret" and .metadata.name == "kadence-secret") | .stringData.KADENCE_LLM_API_KEY' /tmp/rendered-scheduled-fallback.yaml)
          fallback_worker_config=$(yq eval-all '[select(.kind == "ConfigMap" and .metadata.name == "kadence-config") | .data | to_entries[] | select(.key == "KADENCE_SCHEDULED_WORKER_MODEL" or .key == "KADENCE_SCHEDULED_WORKER_BASE_URL")] | length' /tmp/rendered-scheduled-fallback.yaml)
          fallback_worker_key=$(yq eval-all '[select(.kind == "Secret" and .metadata.name == "kadence-secret") | .stringData | to_entries[] | select(.key == "KADENCE_SCHEDULED_WORKER_API_KEY")] | length' /tmp/rendered-scheduled-fallback.yaml)
          if [ "$fallback_model" != "primary-model" ] || [ "$fallback_base_url" != "https://primary.example.com/v1" ] || [ "$fallback_api_key" != "primary-api-key" ] || [ "$fallback_worker_config" != "0" ] || [ "$fallback_worker_key" != "0" ]; then
            echo "expected optional worker model/base/key to be omitted so Scheduled falls back to the main provider; got main-model='$fallback_model' main-base='$fallback_base_url' main-key='$fallback_api_key' worker-config-count=$fallback_worker_config worker-key-count=$fallback_worker_key"
            exit 1
          fi
      - name: assert markitdown basicAuth password is sticky across renders
        run: |
          # With markitdown enabled and a fixed basicAuth.password, two consecutive
          # `helm template` runs must render the same password (the regression fixed
          # by operator-supplied password precedence in markitdown/auth-secret.yaml).
          # The htpasswd field is expected to differ every render (bcrypt salt), so
          # only the password key is asserted on.
          set_args=(--set markitdown.enabled=true --set markitdown.basicAuth.password=fixed-test-password-0123456789)
          helm template kadence ./charts/kadence "${set_args[@]}" > /tmp/rendered-1.yaml
          helm template kadence ./charts/kadence "${set_args[@]}" > /tmp/rendered-2.yaml
          pass1=$(yq eval 'select(.kind == "Secret" and .metadata.name == "kadence-markitdown-auth") | .stringData.password' /tmp/rendered-1.yaml)
          pass2=$(yq eval 'select(.kind == "Secret" and .metadata.name == "kadence-markitdown-auth") | .stringData.password' /tmp/rendered-2.yaml)
          if [ -z "$pass1" ] || [ "$pass1" != "$pass2" ]; then
            echo "expected identical markitdown basicAuth password across renders, got '$pass1' vs '$pass2'"
            exit 1
          fi
      - name: assert mcp/markitdown pods are hardened non-root with probed nginx sidecar
        run: |
          # Wave 2 (issue 15) hardening: every mcp-server and the markitdown
          # Deployment must run as the fixed non-root uid/gid by default, and
          # the nginx sidecar must expose the unauthenticated /healthz probe
          # (the mcp/markitdown container itself binds loopback-only, so the
          # kubelet can never probe it directly).
          set_args=(--set markitdown.enabled=true --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds","persistence":{"enabled":true,"size":"1Gi","mountPath":"/root/.garminconnect"}}]')
          helm template kadence ./charts/kadence "${set_args[@]}" > /tmp/rendered-hardening.yaml
          for name in kadence-mcp-garmin kadence-markitdown; do
            runAsNonRoot=$(yq eval "select(.kind == \"Deployment\" and .metadata.name == \"$name\") | .spec.template.spec.securityContext.runAsNonRoot" /tmp/rendered-hardening.yaml)
            runAsUser=$(yq eval "select(.kind == \"Deployment\" and .metadata.name == \"$name\") | .spec.template.spec.securityContext.runAsUser" /tmp/rendered-hardening.yaml)
            probePath=$(yq eval "select(.kind == \"Deployment\" and .metadata.name == \"$name\") | .spec.template.spec.containers[] | select(.name == \"nginx\") | .readinessProbe.httpGet.path" /tmp/rendered-hardening.yaml)
            if [ "$runAsNonRoot" != "true" ] || [ "$runAsUser" != "65532" ] || [ "$probePath" != "/healthz" ]; then
              echo "expected $name pod securityContext.runAsNonRoot=true, runAsUser=65532, nginx readinessProbe path=/healthz; got runAsNonRoot='$runAsNonRoot' runAsUser='$runAsUser' probePath='$probePath'"
              exit 1
            fi
          done
      - name: assert optional FIT analysis wiring
        run: |
          server_without_fit='[{"name":"activity","scope":"global","image":"example/activity-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"activity-creds"}]'
          server_with_fit='[{"name":"activity","scope":"global","image":"example/activity-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"activity-creds","fitAnalysis":{"enabled":true,"downloadDir":"/data/fit","downloadTool":"download_file"}}]'

          helm template kadence ./charts/kadence --set-json "mcp.servers=$server_without_fit" > /tmp/rendered-fit-disabled.yaml
          disabled_bridge=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence-mcp-activity") | .spec.template.spec.containers[] | select(.name == "file-bridge")] | length' /tmp/rendered-fit-disabled.yaml)
          disabled_service_port=$(yq eval-all '[select(.kind == "Service" and .metadata.name == "kadence-mcp-activity") | .spec.ports[] | select(.port == 8081)] | length' /tmp/rendered-fit-disabled.yaml)
          disabled_app_env=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.template.spec.containers[] | .env[] | select(.name | test("^KADENCE_FIT_ROUTE_"))] | length' /tmp/rendered-fit-disabled.yaml)
          disabled_volume=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence-mcp-activity") | .spec.template.spec.volumes[] | select(.name == "fit-files")] | length' /tmp/rendered-fit-disabled.yaml)
          disabled_mounts=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence-mcp-activity") | .spec.template.spec.containers[] | .volumeMounts[] | select(.name == "fit-files")] | length' /tmp/rendered-fit-disabled.yaml)
          disabled_app_egress=$(yq eval-all '[select(.kind == "NetworkPolicy" and .metadata.name == "kadence") | .spec.egress[] | select(.to[0].podSelector.matchLabels."app.kubernetes.io/component" == "mcp") | .ports[] | select(.port == 8081)] | length' /tmp/rendered-fit-disabled.yaml)
          if [ "$disabled_bridge" != "0" ] || [ "$disabled_service_port" != "0" ] || [ "$disabled_app_env" != "0" ] || [ "$disabled_volume" != "0" ] || [ "$disabled_mounts" != "0" ] || [ "$disabled_app_egress" != "0" ]; then
            echo "expected disabled fitAnalysis to render no bridge, port 8081, app FIT env, shared volume, mounts, or app egress 8081; got bridge=$disabled_bridge port=$disabled_service_port env=$disabled_app_env volume=$disabled_volume mounts=$disabled_mounts app-egress=$disabled_app_egress"
            exit 1
          fi

          helm template kadence ./charts/kadence --set-json "mcp.servers=$server_with_fit" > /tmp/rendered-fit-enabled.yaml
          enabled_bridge=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence-mcp-activity") | .spec.template.spec.containers[] | select(.name == "file-bridge")] | length' /tmp/rendered-fit-enabled.yaml)
          enabled_service_port=$(yq eval-all '[select(.kind == "Service" and .metadata.name == "kadence-mcp-activity") | .spec.ports[] | select(.port == 8081 and .targetPort == 8081 and .name == "file-bridge")] | length' /tmp/rendered-fit-enabled.yaml)
          enabled_app_env=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.template.spec.containers[] | .env[] | select(.name | test("^KADENCE_FIT_ROUTE_"))] | length' /tmp/rendered-fit-enabled.yaml)
          enabled_volume=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence-mcp-activity") | .spec.template.spec.volumes[] | select(.name == "fit-files")] | length' /tmp/rendered-fit-enabled.yaml)
          enabled_mounts=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence-mcp-activity") | .spec.template.spec.containers[] | .volumeMounts[] | select(.name == "fit-files" and .mountPath == "/data/fit")] | length' /tmp/rendered-fit-enabled.yaml)
          enabled_mcp_ingress=$(yq eval-all '[select(.kind == "NetworkPolicy" and .metadata.name == "kadence-mcp-activity") | .spec.ingress[].ports[] | select(.port == 8081)] | length' /tmp/rendered-fit-enabled.yaml)
          enabled_app_egress=$(yq eval-all '[select(.kind == "NetworkPolicy" and .metadata.name == "kadence") | .spec.egress[] | select(.to[0].podSelector.matchLabels."app.kubernetes.io/component" == "mcp") | .ports[] | select(.port == 8081)] | length' /tmp/rendered-fit-enabled.yaml)
          if [ "$enabled_bridge" != "1" ] || [ "$enabled_service_port" != "1" ] || [ "$enabled_app_env" != "6" ] || [ "$enabled_volume" != "1" ] || [ "$enabled_mounts" != "2" ] || [ "$enabled_mcp_ingress" != "1" ] || [ "$enabled_app_egress" != "1" ]; then
            echo "expected enabled fitAnalysis to render one bridge, Service port, shared volume, two mounts, MCP ingress 8081, app egress 8081, and six app route env vars; got bridge=$enabled_bridge port=$enabled_service_port env=$enabled_app_env volume=$enabled_volume mounts=$enabled_mounts mcp-ingress=$enabled_mcp_ingress app-egress=$enabled_app_egress"
            exit 1
          fi

          servers_with_user_fit='[
            {"name":"activity1","scope":{"user":"alice"},"alias":"activity","image":"example/activity-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"activity-creds","fitAnalysis":{"enabled":true,"downloadDir":"/data/fit","downloadTool":"download_file"}},
            {"name":"activity2","scope":{"user":"bob"},"alias":"activity","image":"example/activity-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"activity-creds","fitAnalysis":{"enabled":true,"downloadDir":"/data/fit","downloadTool":"download_file"}}
          ]'
          helm template kadence ./charts/kadence --set-json "mcp.servers=$servers_with_user_fit" > /tmp/rendered-fit-multi-user.yaml
          multi_bridge=$(yq eval-all '[select(.kind == "Deployment" and .metadata.labels."app.kubernetes.io/component" == "mcp") | .spec.template.spec.containers[] | select(.name == "file-bridge")] | length' /tmp/rendered-fit-multi-user.yaml)
          multi_service_port=$(yq eval-all '[select(.kind == "Service" and .metadata.labels."app.kubernetes.io/component" == "mcp") | .spec.ports[] | select(.port == 8081)] | length' /tmp/rendered-fit-multi-user.yaml)
          multi_app_env=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.template.spec.containers[] | .env[] | select(.name | test("^KADENCE_FIT_ROUTE_"))] | length' /tmp/rendered-fit-multi-user.yaml)
          multi_app_env_unique=$(yq eval-all 'select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.template.spec.containers[] | .env[] | select(.name | test("^KADENCE_FIT_ROUTE_")) | .name' /tmp/rendered-fit-multi-user.yaml | sort -u | wc -l | tr -d ' ')
          multi_prefixed_download_tool=$(yq eval-all '[select(.kind == "Deployment" and .metadata.name == "kadence") | .spec.template.spec.containers[] | .env[] | select(.name | test("^KADENCE_FIT_ROUTE_.*_DOWNLOAD_TOOL$")) | select(.value | contains("__"))] | length' /tmp/rendered-fit-multi-user.yaml)
          if [ "$multi_bridge" != "2" ] || [ "$multi_service_port" != "2" ] || [ "$multi_app_env" != "12" ] || [ "$multi_app_env_unique" != "12" ] || [ "$multi_prefixed_download_tool" != "0" ]; then
            echo "expected two user-scoped FIT servers to render two bridges, two Service ports, and twelve unique route env vars with unprefixed download tools; got bridge=$multi_bridge port=$multi_service_port env=$multi_app_env unique=$multi_app_env_unique prefixed-tools=$multi_prefixed_download_tool"
            exit 1
          fi
      - name: assert NetworkPolicy presence/count matches networkPolicy gates (wave 2, issue 14)
        run: |
          # combo: postgres+markitdown+2 mcp servers (garmin, cloakbrowser), defaultDeny=false
          # -> expect exactly 5 NetworkPolicies (app, postgres, markitdown, mcp-garmin, mcp-cloakbrowser), no default-deny.
          set_args=(--set postgres.enabled=true --set postgres.password=x --set markitdown.enabled=true
            --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds"},{"name":"cloakbrowser","scope":"global","image":"example/cloakbrowser-mcp:latest","transport":"streamable-http","port":9000,"path":"/mcp","shm":"512Mi"}]')
          helm template kadence ./charts/kadence "${set_args[@]}" > /tmp/rendered-netpol.yaml
          count=$(yq eval-all '[select(.kind == "NetworkPolicy")] | length' /tmp/rendered-netpol.yaml)
          if [ "$count" != "5" ]; then
            echo "expected 5 NetworkPolicies (app, postgres, markitdown, mcp-garmin, mcp-cloakbrowser), got $count"
            exit 1
          fi
          has_default_deny=$(yq eval-all 'select(.kind == "NetworkPolicy" and .metadata.name == "kadence-default-deny")' /tmp/rendered-netpol.yaml)
          if [ -n "$has_default_deny" ]; then
            echo "expected no default-deny NetworkPolicy when networkPolicy.defaultDeny is unset, but found one"
            exit 1
          fi
          cloakbrowser_egress_except=$(yq eval-all 'select(.kind == "NetworkPolicy" and .metadata.name == "kadence-mcp-cloakbrowser") | .spec.egress[] | select(.to[0].ipBlock.cidr == "0.0.0.0/0") | .to[0].ipBlock.except | length' /tmp/rendered-netpol.yaml)
          if [ "$cloakbrowser_egress_except" != "4" ]; then
            echo "expected cloakbrowser egress ipBlock.except to list 4 CIDRs (RFC1918 x3 + link-local), got '$cloakbrowser_egress_except'"
            exit 1
          fi

          # Content assertions (not just doc count): a gutted policy (egress rules
          # silently dropped) would still pass the count check above, so assert on
          # rule presence directly for the app policy and the cloakbrowser policy.
          app_egress_len=$(yq eval-all 'select(.kind == "NetworkPolicy" and .metadata.name == "kadence") | .spec.egress | length' /tmp/rendered-netpol.yaml)
          if [ "$app_egress_len" != "5" ]; then
            echo "expected app NetworkPolicy to have 5 egress rules (postgres, mcp, markitdown, dns, https), got '$app_egress_len'"
            exit 1
          fi
          app_egress_except=$(yq eval-all 'select(.kind == "NetworkPolicy" and .metadata.name == "kadence") | .spec.egress[] | select(.to[0].ipBlock.cidr == "0.0.0.0/0") | .to[0].ipBlock.except | length' /tmp/rendered-netpol.yaml)
          if [ "$app_egress_except" != "4" ]; then
            echo "expected app egress ipBlock.except to list 4 CIDRs (RFC1918 x3 + link-local), got '$app_egress_except'"
            exit 1
          fi
          cloakbrowser_egress_len=$(yq eval-all 'select(.kind == "NetworkPolicy" and .metadata.name == "kadence-mcp-cloakbrowser") | .spec.egress | length' /tmp/rendered-netpol.yaml)
          if [ "$cloakbrowser_egress_len" != "2" ]; then
            echo "expected cloakbrowser NetworkPolicy to have 2 egress rules (dns, https), got '$cloakbrowser_egress_len'"
            exit 1
          fi

          # same combo + defaultDeny=true -> expect 6 (the 5 above + the namespace-wide default-deny).
          helm template kadence ./charts/kadence "${set_args[@]}" --set networkPolicy.defaultDeny=true > /tmp/rendered-netpol-deny.yaml
          count_deny=$(yq eval-all '[select(.kind == "NetworkPolicy")] | length' /tmp/rendered-netpol-deny.yaml)
          if [ "$count_deny" != "6" ]; then
            echo "expected 6 NetworkPolicies with defaultDeny=true, got $count_deny"
            exit 1
          fi

          # networkPolicy.enabled=false -> expect zero NetworkPolicies, regardless of defaultDeny.
          count_disabled=$(helm template kadence ./charts/kadence "${set_args[@]}" --set networkPolicy.enabled=false | yq eval-all '[select(.kind == "NetworkPolicy")] | length')
          if [ "$count_disabled" != "0" ]; then
            echo "expected 0 NetworkPolicies with networkPolicy.enabled=false, got $count_disabled"
            exit 1
          fi

  kube-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      - name: Render manifests (same combos as lint-and-template)
        run: |
          helm template kadence ./charts/kadence > rendered-default.yaml
          helm template kadence ./charts/kadence -f ./charts/kadence/values-dev.yaml.example > rendered-example.yaml
          helm template kadence ./charts/kadence \
            --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds","persistence":{"enabled":true,"size":"1Gi","mountPath":"/root/.garminconnect"}}]' > rendered-mcp.yaml
          helm template kadence ./charts/kadence \
            --set postgres.enabled=true --set postgres.password=x --set markitdown.enabled=true \
            --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds"},{"name":"cloakbrowser","scope":"global","image":"example/cloakbrowser-mcp:latest","transport":"streamable-http","port":9000,"path":"/mcp","shm":"512Mi"}]' > rendered-netpol.yaml
          helm template kadence ./charts/kadence \
            --set postgres.enabled=true --set postgres.password=x --set markitdown.enabled=true --set networkPolicy.defaultDeny=true \
            --set-json 'mcp.servers=[{"name":"garmin","scope":"global","image":"example/garmin-mcp:latest","transport":"streamable-http","port":8000,"path":"/mcp","existingSecret":"garmin-creds"},{"name":"cloakbrowser","scope":"global","image":"example/cloakbrowser-mcp:latest","transport":"streamable-http","port":9000,"path":"/mcp","shm":"512Mi"}]' > rendered-netpol-deny.yaml
      - name: Run kube-linter (advisory)
        # ADVISORY: continue-on-error means findings never fail the workflow.
        # See .kube-linter.yaml for the documented current baseline. Flip to
        # blocking once the Wave 2 securityContext/resources hardening lands
        # and those findings clear.
        continue-on-error: true
        run: |
          # set -o pipefail so `| tee` doesn't swallow kube-linter's exit code;
          # this step's own continue-on-error is what keeps the job advisory
          # today, so once that's dropped this pipefail is what makes the
          # blocking flip actually work.
          set -o pipefail
          docker run --rm -v "$PWD:/repo" -w /repo \
            stackrox/kube-linter:v0.8.3@sha256:f2bfce7879206d32f69ab6572c376f916643f54ca291ac38cf7d01ef591ff3f9 \
            lint --config=.kube-linter.yaml rendered-default.yaml rendered-example.yaml rendered-mcp.yaml rendered-netpol.yaml rendered-netpol-deny.yaml \
            | tee kube-linter-report.txt
      - name: Add kube-linter report to job summary
        # Guarded with [ -f ... ] so this never fails the job even if the lint
        # step above died before writing kube-linter-report.txt (e.g. the
        # docker pull failing) â€” this step is purely informational.
        if: always()
        run: |
          {
            echo "### kube-linter (advisory)"
            echo '```'
            if [ -f kube-linter-report.txt ]; then
              cat kube-linter-report.txt
            else
              echo "report not generated"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
