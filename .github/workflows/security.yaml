name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Run gosec
        # G124: session cookie Secure flag is intentionally conditional on
        # KADENCE_ENV (dev serves over plain HTTP); HttpOnly and SameSite=Lax
        # are always set regardless of environment.
        run: go tool gosec -exclude-generated -exclude=G124 ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        # GO-2025-3884 (gorilla/csrf TrustedOrigins ignores the origin scheme):
        # no upstream fix exists and gorilla/csrf remains our CSRF library. The
        # exposure is limited — TrustedOrigins is operator-configured, opt-in via
        # KADENCE_TRUSTED_ORIGINS (empty by default), and only affects the
        # http/https distinction for explicitly trusted extra hosts. Temporarily
        # allowlisted below; any OTHER called vulnerability still fails the job.
        # Review whenever gorilla/csrf ships a fix or we migrate off it.
        run: |
          set -o pipefail
          go tool govulncheck -format json ./... > govulncheck.json || true
          python3 - <<'PY'
          import json, sys

          # OSV IDs consciously accepted; see the step comment for rationale.
          ALLOWLIST = {"GO-2025-3884"}

          raw = open("govulncheck.json").read().strip()
          if not raw:
              print("govulncheck produced no output — treating as failure")
              sys.exit(1)

          decoder = json.JSONDecoder()
          idx, called = 0, {}
          while idx < len(raw):
              while idx < len(raw) and raw[idx].isspace():
                  idx += 1
              if idx >= len(raw):
                  break
              obj, idx = decoder.raw_decode(raw, idx)
              finding = obj.get("finding")
              if not finding:
                  continue
              trace = finding.get("trace") or [{}]
              # A finding with a function in its top trace frame is actually
              # reachable from our code (mirrors govulncheck's non-zero exit).
              if trace[0].get("function"):
                  called.setdefault(finding["osv"], set()).add(
                      trace[0].get("module", "?")
                  )

          unexpected = {osv: mods for osv, mods in called.items() if osv not in ALLOWLIST}
          if unexpected:
              print("Unwhitelisted vulnerabilities called by our code:")
              for osv, mods in sorted(unexpected.items()):
                  print(f"  {osv}: {sorted(mods)}")
              sys.exit(1)

          if called:
              print("Only allowlisted vulnerabilities found:", sorted(called))
          else:
              print("No called vulnerabilities found.")
          PY

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install semgrep
        run: pipx install semgrep==1.165.0
      - name: Run semgrep
        # cookie-missing-secure: session cookie Secure flag is intentionally
        # conditional on KADENCE_ENV (dev serves over plain HTTP); HttpOnly
        # and SameSite=Lax are always set regardless of environment.
        run: >-
          semgrep scan
          --config p/golang
          --config p/owasp-top-ten
          --metrics=off
          --error
          --exclude-rule go.lang.security.audit.net.cookie-missing-secure.cookie-missing-secure

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # BLOCKING. Runs the gitleaks CLI directly via its pinned Docker image
        # rather than the official gitleaks-action, which requires a license
        # key (GITLEAKS_LICENSE) for use on organization-owned repositories.
        # The CLI itself has no license/token requirement. .gitleaks.toml
        # allowlists a handful of known-fake test fixtures (see that file for
        # details) — it never disables a rule wholesale.
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=. --config=.gitleaks.toml --redact -v

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build image for scanning
        # Scans the Dockerfile.dev image (the same one the e2e-kind smoke test
        # in e2e.yaml already builds), not the goreleaser-built prod image:
        # ./Dockerfile expects pre-built per-platform binaries from goreleaser
        # and isn't standalone-buildable in a plain CI job. Both share the
        # same distroless-nonroot runtime base and entrypoint.
        run: docker build -f Dockerfile.dev -t kadence:scan .
      - name: Run trivy (advisory)
        # ADVISORY: exit-code 0 + continue-on-error mean this never fails the
        # workflow, even on findings. Flip to blocking (drop both) once
        # .trivyignore has stayed clean in CI for a while.
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: kadence:scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          trivyignores: .trivyignore
          output: trivy-report.txt
      - name: Add trivy report to job summary
        if: always()
        run: |
          {
            echo "### Trivy image scan (advisory, HIGH/CRITICAL)"
            echo '```'
            cat trivy-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - run: npm ci
      - name: npm audit (advisory)
        # ADVISORY: 0 known high/critical runtime vulns as of 2026-07-22.
        # Flip to blocking (remove continue-on-error) once that's held for a
        # few CI runs.
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
