name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run gosec
        run: go tool gosec -exclude-generated ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: go tool govulncheck ./...

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install semgrep
        run: pipx install semgrep==1.165.0
      - name: Run semgrep
        run: >-
          semgrep scan
          --config p/golang
          --config p/owasp-top-ten
          --metrics=off
          --error
