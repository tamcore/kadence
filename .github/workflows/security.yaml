name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Run gosec
        # G124: session cookie Secure flag is intentionally conditional on
        # KADENCE_ENV (dev serves over plain HTTP); HttpOnly and SameSite=Lax
        # are always set regardless of environment.
        run: go tool gosec -exclude-generated -exclude=G124 ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Run govulncheck
        run: go tool govulncheck ./...

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install semgrep
        run: pipx install semgrep==1.165.0
      - name: Run semgrep
        # cookie-missing-secure: session cookie Secure flag is intentionally
        # conditional on KADENCE_ENV (dev serves over plain HTTP); HttpOnly
        # and SameSite=Lax are always set regardless of environment.
        run: >-
          semgrep scan
          --config p/golang
          --config p/owasp-top-ten
          --metrics=off
          --error
          --exclude-rule go.lang.security.audit.net.cookie-missing-secure.cookie-missing-secure
