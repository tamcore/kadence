repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^charts/.*/templates/
      - id: check-added-large-files

  # Same gitleaks version + .gitleaks.toml allowlist as the CI gitleaks job
  # (.github/workflows/security.yaml) — catches secrets before they're
  # committed, rather than only at push/PR time.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: go-test
        name: Run Go tests (short mode, skips integration tests)
        entry: go test -short ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-fmt
        name: go fmt
        entry: go fmt ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-fix
        name: go fix
        entry: go fix ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: gosec
        name: gosec
        # Same excludes as the CI gosec job (.github/workflows/security.yaml):
        # G124 is an intentional, reviewed exception (see that file's comment).
        entry: go tool gosec -quiet -exclude-generated -exclude=G124 ./...
        language: system
        types: [go]
        pass_filenames: false
